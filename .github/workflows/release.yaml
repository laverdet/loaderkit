name: Release

on:
  push:
    branches: [ main ]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      # Setup
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6

      # Install
      - run: pnpm install --frozen-lockfile
      - run: npx tsc -b

      # Publish
      - uses: changesets/action@v1
        with:
          publish: pnpm publish --no-git-checks --provenance --recursive
